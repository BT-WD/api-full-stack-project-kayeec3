<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NASA APOD (Static)</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>NASA Astronomy Picture of the Day</h1>
            <p>Explore the cosmos, one day at a time</p>
        </div>

        <div class="card" id="data-container">
            <h2 id="title">APOD Title</h2>
            <p class="date" id="date">YYYY-MM-DD</p>

            <div id="media-container">
                <img src="" alt="APOD Image">
            </div>

            <h3>Description</h3>
            <p id="description">APOD description goes here.</p>

            <a id="hd-link" href="#" target="_blank">View HD Image</a>
        </div>
    </div>
</body>
</html>
