<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NASA APOD Viewer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>NASA Astronomy Picture of the Day</h1>
            <p>Explore the cosmos, one day at a time</p>
        </div>

        <div class="date-picker">
            <form id="apod-form" class="date-form">
                <label for="date">Select Date:</label>
                <input type="date" id="date" required>
                <button type="submit">View APOD</button>
                <button type="button" id="random-btn" class="random-btn">🎲 Random</button>
            </form>
        </div>

        <div id="history-section">
            <div class="history-header">
                <h3>Previously Viewed</h3>
                <button id="clear-history" class="clear-btn">Clear History</button>
            </div>
            <div id="history-list"></div>
        </div>

        <div id="loading">Loading...</div>
        <div id="error"></div>

        <div id="result">
            <div class="result-header">
                <h2 id="apod-title"></h2>
                <p id="apod-date"></p>
                <p id="apod-copyright"></p>
            </div>
            <div id="media-container"></div>
            <div class="result-footer">
                <h3>Description</h3>
                <p id="apod-description"></p>
                <div id="hd-link-container"></div>
            </div>
        </div>

        <div id="placeholder">
            <p>Select a date and click "View APOD" to explore the cosmos!</p>
            <p class="placeholder-hint">Or try the Random button for a surprise!</p>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
